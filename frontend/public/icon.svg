<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Navy gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001A3A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#002F67;stop-opacity:1"/>
    </linearGradient>
    <!-- Cyan glow for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for center -->
    <filter id="centerglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to hexagon -->
    <clipPath id="hexclip">
      <polygon points="100,6 181,53 181,147 100,194 19,147 19,53"/>
    </clipPath>
  </defs>

  <!-- Hexagon background fill -->
  <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" fill="url(#bg)"/>

  <!-- Blueprint grid lines (subtle diagonal depth) -->
  <g clip-path="url(#hexclip)" stroke="#50E6FF" stroke-width="0.5" opacity="0.08">
    <line x1="20" y1="20" x2="180" y2="180"/>
    <line x1="60" y1="10" x2="200" y2="160"/>
    <line x1="-10" y1="60" x2="160" y2="200"/>
    <line x1="180" y1="20" x2="20" y2="180"/>
    <line x1="140" y1="10" x2="0" y2="160"/>
    <line x1="200" y1="60" x2="40" y2="200"/>
    <line x1="10" y1="100" x2="190" y2="100"/>
    <line x1="100" y1="10" x2="100" y2="190"/>
  </g>

  <!-- Hexagon border (Azure blue) -->
  <polygon points="100,6 181,53 181,147 100,194 19,147 19,53"
    fill="none" stroke="#0078D4" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Framework network: pentagon of 5 nodes connected by lines -->
  <!-- Nodes at r=52 from center (100,100), rotated so top node at top -->
  <!-- Node angles: 90° top, 162°, 234°, 306°, 18° -->
  <!-- Positions:
    N0 (top):   100 + 52*cos(90°)=100,  100 - 52*sin(90°)=48   → (100, 48)
    N1 (TR):    100 + 52*cos(18°)=149,  100 - 52*sin(18°)=84   → (149, 84)
    N2 (BR):    100 + 52*cos(-54°)=131, 100 - 52*sin(-54°)=142 → (131, 142)
    N3 (BL):    100 + 52*cos(234°)=69,  100 - 52*sin(234°)=142 → (69, 142)
    N4 (TL):    100 + 52*cos(162°)=51,  100 - 52*sin(162°)=84  → (51, 84)
  -->
  <g stroke="#50E6FF" stroke-width="0.8" opacity="0.3" fill="none">
    <!-- Pentagon outline -->
    <polygon points="100,48 149,84 131,142 69,142 51,84" stroke-width="0.8"/>
    <!-- Spokes to center -->
    <line x1="100" y1="100" x2="100" y2="48"/>
    <line x1="100" y1="100" x2="149" y2="84"/>
    <line x1="100" y1="100" x2="131" y2="142"/>
    <line x1="100" y1="100" x2="69" y2="142"/>
    <line x1="100" y1="100" x2="51" y2="84"/>
  </g>

  <!-- Architectural "A" frame — bold white strokes -->
  <!-- Apex: (100, 46), Left foot: (63, 148), Right foot: (137, 148) -->
  <!-- Crossbar: y=110, x from 77 to 123 -->
  <g stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left leg -->
    <line x1="100" y1="46" x2="63" y2="148"/>
    <!-- Right leg -->
    <line x1="100" y1="46" x2="137" y2="148"/>
    <!-- Crossbar -->
    <line x1="77" y1="110" x2="119" y2="110"/>
  </g>

  <!-- Cyan checkmark at right end of crossbar — review approval signal -->
  <!-- From (119,110) → down-right → up-right -->
  <polyline points="117,110 124,119 140,97"
    stroke="#50E6FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"
    filter="url(#glow)"/>

  <!-- Vertex dots at all 6 hexagon corners -->
  <g fill="#50E6FF" filter="url(#glow)">
    <circle cx="100" cy="6"   r="4"/>
    <circle cx="181" cy="53"  r="4"/>
    <circle cx="181" cy="147" r="4"/>
    <circle cx="100" cy="194" r="4"/>
    <circle cx="19"  cy="147" r="4"/>
    <circle cx="19"  cy="53"  r="4"/>
  </g>

  <!-- Framework node dots (pentagon corners) -->
  <g fill="#50E6FF" opacity="0.7" filter="url(#glow)">
    <circle cx="100" cy="48"  r="3"/>
    <circle cx="149" cy="84"  r="3"/>
    <circle cx="131" cy="142" r="3"/>
    <circle cx="69"  cy="142" r="3"/>
    <circle cx="51"  cy="84"  r="3"/>
  </g>

  <!-- Center glow dot -->
  <circle cx="100" cy="100" r="5" fill="#50E6FF" filter="url(#centerglow)" opacity="0.9"/>
</svg>
